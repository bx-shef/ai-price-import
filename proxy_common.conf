# Shared proxy headers for every location that forwards to the Nitro backend.
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
# Append the real client so the backend (rate-limiter clientKey) reads the LAST hop.
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "";
# NB: proxy_read_timeout/proxy_send_timeout are NOT set here — they live in the server{}
# block (default 180s) so a single location can override them without an "duplicate
# directive" error (this file is include-d into every location; the demo route raises the
# timeout to 300s for OCR, see nginx.conf). Adding them back here would break `nginx -t`.
