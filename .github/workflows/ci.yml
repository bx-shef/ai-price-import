# CI for the procure-ai redesign (Nuxt 4 monolith). Runs the full `pnpm check`
# gate + SSG build + a backend Docker image build validation. Name kept as "CI" so
# the branch-protection required check and deploy.yml's workflow_run trigger map to it.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm generate
      # Validate the shared front-proxy per-vhost tuning (deploy/vhost.d/*) — GH #71 option 3.
      # The app's OWN nginx.conf is validated by the docker-build job (Dockerfile `nginx -t`);
      # this covers the front nginx-proxy vhost snippet, which was otherwise only checked at
      # `make proxy-tune` apply time — so a broken file could reach prod (413/504 / proxy wedge).
      # Install nginx from the Ubuntu mirror (not Docker Hub) so the required gate has no
      # anonymous-pull rate-limit flake; check-vhost.sh uses the local binary when present.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends nginx-light
      - run: sh scripts/check-vhost.sh

  docker-build:
    name: validate backend image builds
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [backend, app]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      # Full build so the backend extraction toolchain (pdftotext/libreoffice/tesseract)
      # AND the app nginx config are validated in CI, not only on deploy. No push here.
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
