name: Publish image

run-name: >-
  ${{ (github.event_name == 'push' && format('🚀 Release {0} → prod (:latest)', github.ref_name))
  || (github.event_name == 'workflow_dispatch' && '🚀 Manual deploy → prod (:latest)')
  || format('🚀 Deploy main {0} → prod (:latest)', github.event.workflow_run.head_sha) }}

# Build + publish the single redesign backend image to GHCR. CONTINUOUS DEPLOYMENT —
# a GREEN CI on main ships to prod (Watchtower polls :latest); no release tag required.
#   • Push to main → after CI passes (workflow_run): :latest + sha-<sha>.
#   • Push a v* tag → :latest + :<tag> + sha-<sha> (optional marked release, CI-gated).
#   • Manual dispatch → same, CI-gated.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-ci:
    name: Verify CI is green for this commit
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Require a green CI run on this SHA (release tag & manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ github.sha }}"
          latest="$(gh api -X GET \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs" \
            -f head_sha="$sha" -f status=completed \
            --jq '[.workflow_runs[]] | sort_by(.created_at) | last | .conclusion // ""')"
          echo "Latest completed CI conclusion for ${sha}: ${latest:-<none>}"
          if [ "$latest" != "success" ]; then
            echo "::error::CI for ${sha} is not green (latest: ${latest:-none}). Refusing to publish :latest."
            exit 1
          fi

  build-and-push:
    name: Build and push ${{ matrix.target }} image to GHCR
    needs: [verify-ci]
    runs-on: ubuntu-latest
    # Green-CI gate for main pushes: a workflow_run reaches here only when the triggering
    # CI succeeded — a red CI on main never publishes :latest. Do NOT drop this clause.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # backend = Nitro (pages+API+pipeline); app = front nginx (proxy/limit_req/CSP).
        include:
          - target: backend
            suffix: ''
          - target: app
            suffix: '-app'
    steps:
      - name: Resolve commit + image tags
        id: meta
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          sha="${HEAD_SHA:-${{ github.sha }}}"
          if [ "$sha" = "null" ]; then sha="${{ github.sha }}"; fi
          base="ghcr.io/${{ github.repository_owner }}/procure-ai${{ matrix.suffix }}"
          tags="${base}:latest"$'\n'"${base}:sha-${sha}"
          if [ "${{ github.event_name }}" = "push" ]; then
            tags="${tags}"$'\n'"${base}:${{ github.ref_name }}"
          fi
          {
            echo "sha=${sha}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push ${{ matrix.target }} image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          build-args: |
            COMMIT_SHA=${{ steps.meta.outputs.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
