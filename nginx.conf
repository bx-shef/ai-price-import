# App-level reverse proxy for procure-ai (prod). Sits BEHIND the shared nginx-proxy
# (which terminates TLS + routes price-import.bx-shef.by here) and IN FRONT of the
# Nitro backend (:3000, which serves the prerendered pages + /api + pipeline).
# Responsibilities here (docs/redesign/09-deploy.md): login rate-limit, deny of
# internal endpoints, CSP/security headers for the Bitrix24 iframe, body-size caps.
# Base image: nginxinc/nginx-unprivileged (non-root, listens on :8080).

# Real client IP comes from the shared proxy's X-Forwarded-For. The shared nginx-proxy
# APPENDS the real peer to any client-sent XFF ($proxy_add_x_forwarded_for), so the real
# client is the RIGHTMOST entry. `real_ip_recursive off` makes nginx take that rightmost
# hop — the address the proxy observed, which the client cannot forge. (With recursive ON
# + trust-all, nginx would instead walk to the LEFTMOST, i.e. the attacker-supplied value,
# letting a per-request forged XFF rotate the rate-limit key and defeat the login throttle.)
real_ip_header X-Forwarded-For;
real_ip_recursive off;
# Trust only private/docker ranges (the shared proxy is a private container IP; the app is
# never published to the host — only proxy-net/internal reach it). Defense-in-depth.
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;

# Anti-bruteforce for the operator login (docs/AUTH.md): ~10 req/min per client IP.
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
# Public demo (OCR/LLM) — unauthenticated + expensive, so cap per-IP request rate AND
# concurrency here (in addition to the app's 3-files/10min limiter + global AI_MAX_CONCURRENCY):
# a flood otherwise burns OCR CPU + ANTHROPIC_* spend. rate ~6/min smooths bursts, and
# limit_conn caps simultaneous 300s OCR jobs from one IP so a single client can't hog the pool.
limit_req_zone $binary_remote_addr zone=demo:10m rate=6r/m;
limit_conn_zone $binary_remote_addr zone=demo_conn:10m;
# Throttled requests return 429 (as docs/AUTH.md state), not nginx's default 503.
limit_req_status 429;
limit_conn_status 429;

server {
  listen 8080;
  server_name price-import.bx-shef.by _;

  # Resolve the `backend` service via Docker's embedded DNS AT RUNTIME (not at build /
  # startup): lets `nginx -t` pass without the upstream up, and nginx re-resolves if the
  # backend container's IP changes instead of failing to start.
  resolver 127.0.0.11 valid=30s ipv6=off;
  set $backend "backend:3000";

  # Uploads: in-portal documents up to ~20 MB (+ multipart overhead).
  client_max_body_size 25m;

  # Default proxy timeouts for ALL locations (inherited). Kept here — not in
  # proxy_common.conf — so a single location can OVERRIDE them (e.g. the demo route below
  # raises to 300s for OCR) without nginx's "duplicate directive" error from the shared
  # include. proxy_common.conf therefore deliberately no longer sets these.
  proxy_read_timeout 180s;
  proxy_send_timeout 180s;

  # Security + Bitrix24 iframe. frame-ancestors must allow the B24 cloud so /app,
  # /settings render inside the portal; connect-src allows same-origin API + B24.
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  # HSTS: TLS is terminated by the shared front nginx-proxy and this vhost is only reachable
  # over HTTPS, so pin HTTPS in the browser (2y). includeSubDomains scopes to this host's own
  # subdomains (none today) — it does NOT touch sibling *.bx-shef.by hosts. No `preload` (that's
  # a separate, harder-to-reverse commitment). Sent on the main app; re-added on /b24-form.html
  # below because an add_header in a location replaces (not merges) inherited ones.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  # script-src keeps 'unsafe-inline': the pages are served by the backend Nitro server
  # (location / proxies to it), and Nuxt re-injects runtimeConfig.public into the inline
  # window.__NUXT__.config script AT REQUEST TIME from the container's NUXT_PUBLIC_* env.
  # A build-time sha256 hash therefore never matches the served script → the browser blocks
  # Nuxt's bootstrap → no hydration → client-only components (demo) don't mount. Inline
  # hashes are incompatible with runtime config injection here, so we allow inline scripts.
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://*.bitrix24.com https://*.bitrix24.ru https://*.bitrix24.by https://*.bitrix24.eu https://*.bitrix24.kz; frame-ancestors 'self' https://*.bitrix24.com https://*.bitrix24.ru https://*.bitrix24.by https://*.bitrix24.eu https://*.bitrix24.kz; base-uri 'self'; object-src 'none'" always;

  # ── Internal endpoints — never exposed to the internet (also token-guarded in-app) ──
  location /api/queues       { deny all; }
  location /api/b24/app-option-check { deny all; }

  # ── Operator login — throttled (429 on abuse). burst=5 nodelay smooths bursts. ──
  location = /api/auth/login {
    limit_req zone=login burst=5 nodelay;
    proxy_pass http://$backend$request_uri;
    include /etc/nginx/proxy_common.conf;
  }

  # ── Public demo — body cap matches the app's 5 MB limit (+slack); app enforces 411/413.
  #    Must cover PDF/scan uploads (AI path), not just text — else valid files get an
  #    opaque nginx 413 before the handler's honest JSON error. ──
  location = /api/demo/extract {
    # Coarse per-IP caps for this unauthenticated, expensive route (see zones above):
    # ~6/min with a small burst, and at most 2 concurrent OCR jobs per IP. Abuse → 429.
    limit_req zone=demo burst=3 nodelay;
    limit_conn demo_conn 2;
    client_max_body_size 6m;
    # OCR of scans/photos (poppler/tesseract) + the extraction agent can exceed the
    # 180s server-level default; override to give the demo route headroom so a heavy scan
    # returns the handler's JSON instead of a 504. Must be raised on the shared front
    # proxy too (deploy/vhost.d/<host>) — otherwise it caps first. See GH #63.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://$backend$request_uri;
    include /etc/nginx/proxy_common.conf;
  }

  # ── Embedded B24 CRM form host (public/b24-form.html, iframed by BriefForm) ──
  # It loads the official Bitrix24 loader (inline bootstrap + external cdn script), so
  # it needs a relaxed, form-scoped CSP; the strict page CSP above stays intact. The
  # page's frame-src falls back to default-src 'self', which covers this same-origin iframe.
  location = /b24-form.html {
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self' https://*.bitrix24.by https://*.bitrix24.ru https://*.bitrix24.com https://*.bitrix24.kz https://*.bitrix24.tech; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.bitrix24.by https://*.bitrix24.ru https://*.bitrix24.com https://*.bitrix24.kz https://*.bitrix24.tech; style-src 'self' 'unsafe-inline' https://*.bitrix24.by https://*.bitrix24.ru https://*.bitrix24.com; img-src 'self' data: https:; connect-src 'self' https://*.bitrix24.by https://*.bitrix24.ru https://*.bitrix24.com https://*.bitrix24.kz https://*.bitrix24.tech; font-src 'self' data: https:; frame-src https://*.bitrix24.by https://*.bitrix24.ru https://*.bitrix24.com https://*.bitrix24.kz; frame-ancestors 'self'; base-uri 'self';" always;
    proxy_pass http://$backend$request_uri;
    include /etc/nginx/proxy_common.conf;
  }

  # ── Everything else → backend (pages + API + B24 events webhook) ──
  location / {
    proxy_pass http://$backend$request_uri;
    include /etc/nginx/proxy_common.conf;
  }
}
