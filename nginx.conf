# App-level reverse proxy for procure-ai (prod). Sits BEHIND the shared nginx-proxy
# (which terminates TLS + routes price-import.bx-shef.by here) and IN FRONT of the
# Nitro backend (:3000, which serves the prerendered pages + /api + pipeline).
# Responsibilities here (docs/redesign/09-deploy.md): login rate-limit, deny of
# internal endpoints, CSP/security headers for the Bitrix24 iframe, body-size caps.
# Base image: nginxinc/nginx-unprivileged (non-root, listens on :8080).

# Real client IP comes from the shared proxy's X-Forwarded-For. The shared nginx-proxy
# APPENDS the real peer to any client-sent XFF ($proxy_add_x_forwarded_for), so the real
# client is the RIGHTMOST entry. `real_ip_recursive off` makes nginx take that rightmost
# hop — the address the proxy observed, which the client cannot forge. (With recursive ON
# + trust-all, nginx would instead walk to the LEFTMOST, i.e. the attacker-supplied value,
# letting a per-request forged XFF rotate the rate-limit key and defeat the login throttle.)
real_ip_header X-Forwarded-For;
real_ip_recursive off;
# Trust only private/docker ranges (the shared proxy is a private container IP; the app is
# never published to the host — only proxy-net/internal reach it). Defense-in-depth.
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;

# Anti-bruteforce for the operator login (docs/AUTH.md): ~10 req/min per client IP.
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
# Throttled requests return 429 (as docs/AUTH.md state), not nginx's default 503.
limit_req_status 429;

server {
  listen 8080;
  server_name price-import.bx-shef.by _;

  # Resolve the `backend` service via Docker's embedded DNS AT RUNTIME (not at build /
  # startup): lets `nginx -t` pass without the upstream up, and nginx re-resolves if the
  # backend container's IP changes instead of failing to start.
  resolver 127.0.0.11 valid=30s ipv6=off;
  set $backend "backend:3000";

  # Uploads: in-portal documents up to ~20 MB (+ multipart overhead).
  client_max_body_size 25m;

  # Security + Bitrix24 iframe. frame-ancestors must allow the B24 cloud so /app,
  # /settings render inside the portal; connect-src allows same-origin API + B24.
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://*.bitrix24.com https://*.bitrix24.ru https://*.bitrix24.by https://*.bitrix24.eu https://*.bitrix24.kz; frame-ancestors 'self' https://*.bitrix24.com https://*.bitrix24.ru https://*.bitrix24.by https://*.bitrix24.eu https://*.bitrix24.kz; base-uri 'self'; object-src 'none'" always;

  # ── Internal endpoints — never exposed to the internet (also token-guarded in-app) ──
  location /api/queues       { deny all; }
  location /api/b24/app-option-check { deny all; }

  # ── Operator login — throttled (429 on abuse). burst=5 nodelay smooths bursts. ──
  location = /api/auth/login {
    limit_req zone=login burst=5 nodelay;
    proxy_pass http://$backend$request_uri;
    include /etc/nginx/proxy_common.conf;
  }

  # ── Public demo — tighter body cap (text only, ≤1 MB; app also enforces 411/413) ──
  location = /api/demo/extract {
    client_max_body_size 2m;
    proxy_pass http://$backend$request_uri;
    include /etc/nginx/proxy_common.conf;
  }

  # ── Everything else → backend (pages + API + B24 events webhook) ──
  location / {
    proxy_pass http://$backend$request_uri;
    include /etc/nginx/proxy_common.conf;
  }
}
